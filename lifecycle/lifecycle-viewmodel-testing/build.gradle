import androidx.build.SoftwareType
import androidx.build.PlatformIdentifier
import org.jetbrains.kotlin.gradle.plugin.KotlinPlatformType
import org.jetbrains.kotlin.konan.target.Family

plugins {
    id("AndroidXPlugin")
}

androidXMultiplatform {
    androidLibrary {
        namespace = "androidx.lifecycle.viewmodel.testing"
    }
    desktop()
    mac()
    linux()
    ios()
    watchos()
    tvos()
    mingwX64()
    js()
    wasmJs()

    defaultPlatform(PlatformIdentifier.ANDROID)

    sourceSets {
        commonMain.dependencies {
            api(project(":lifecycle:lifecycle-viewmodel"))
            api(libs.kotlinCoroutinesCore)
            implementation(project(":lifecycle:lifecycle-runtime"))
            implementation(project(":lifecycle:lifecycle-runtime-testing"))
            implementation(project(":lifecycle:lifecycle-viewmodel-savedstate"))
        }

        commonTest.dependencies {
            implementation(project(":kruth:kruth"))
            implementation(libs.kotlinTest)
            implementation(libs.kotlinCoroutinesTest)
        }

        androidDeviceTest.dependencies {
            implementation("androidx.core:core-ktx:1.2.0")
            implementation(libs.testExtJunit)
            implementation(libs.testCore)
            implementation(libs.testRunner)
        }

        nonAndroidMain.dependsOn(commonMain)
        nonAndroidTest.dependsOn(commonTest)
        desktopMain.dependsOn(nonAndroidMain)
        desktopTest.dependsOn(nonAndroidTest)
        nonJvmMain.dependsOn(nonAndroidMain)
        nonJvmTest.dependsOn(nonAndroidTest)

        webTest.dependencies {
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.9.0")
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0")
        }
    }
}

androidx {
    name = "Lifecycle ViewModel Testing"
    type = SoftwareType.PUBLISHED_TEST_LIBRARY
    inceptionYear = "2024"
    description = "Testing utilities for 'lifecycle-viewmodel' artifact"
    enableRobolectric()
}
