/**
 * This file was created using the `createProject` gradle task (./gradlew createProject)
 *
 * Please use the task when creating a new project, rather than copying an existing project and
 * modifying its settings.
 */
import androidx.build.SoftwareType
import androidx.build.AndroidXConfig

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
}

dependencies {
    api(libs.jspecify)
    api("androidx.annotation:annotation:1.8.1")
    api("androidx.core:core:1.1.0")
    api("androidx.annotation:annotation-experimental:1.3.0")

    // Technically, there's no tests in WebKit but we need it as we run as sanity check to
    // make sure that if anyone added any tests we would still run them while running :webkit:webkit:connectedAndroidTest.
    androidTestImplementation(libs.testRunner)
}

ext {
    webviewBoundaryInterfacesDir = new File(AndroidXConfig.getExternalProjectPath(project),
            "webview_support_interfaces")
}

android {
    sourceSets {
        // Allow compiling the WebView support library boundary interfaces from this project.
        main.java.srcDirs += new File(webviewBoundaryInterfacesDir, "src").getCanonicalPath()
    }
    defaultConfig.consumerProguardFiles(
            new File(webviewBoundaryInterfacesDir, "proguard.flags"), "proguard-rules.pro"
    )
    // Don't change this value without contacting the WebKit owners.
    compileSdk  { version = release(33) }
    namespace = "androidx.webkit"
}

androidx {
    name = "Webkit"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2017"
    description = "The Jetpack Webkit Library is a static library you can add to your Android application in order to use android.webkit APIs that are not available for older platform versions."
    additionalDeviceTestApkKeys.add("chrome")
}
