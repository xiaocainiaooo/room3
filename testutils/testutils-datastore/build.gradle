import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
}

androidXMultiplatform {
    jvm()
    mac()
    linux()
    ios()
    watchos()
    tvos()
    wasmJs()
    js()

    sourceSets {
        commonMain.dependencies {
            api(project(":datastore:datastore-core"))
            api(project(":datastore:datastore-core-okio"))
            api(libs.kotlinTest)
            api(libs.kotlinCoroutinesCore)
            api(libs.kotlinCoroutinesTest)
            api(libs.okio)
        }

        commonTest.dependencies {
            implementation(project(":kruth:kruth"))
            implementation(libs.kotlinTest)
        }

        nonWebCommonMain {}.dependsOn(commonMain)
        nonWebCommonTest {}.dependsOn(commonTest)
        nativeMain.dependsOn(nonWebCommonMain)

        jvmMain {
            dependsOn(nonWebCommonMain)
            dependencies {
                api(libs.kotlinTest)
            }
        }

        jvmTest {
            dependsOn(nonWebCommonTest)
            dependencies {
                implementation(libs.kotlinTest)
            }
        }
    }
}

androidx {
    type = SoftwareType.INTERNAL_TEST_LIBRARY
}
