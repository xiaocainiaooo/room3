import com.android.build.api.dsl.ManagedVirtualDevice

plugins {
    id("AndroidXPlugin")
    id("com.android.test")
    id("androidx.baselineprofile")
}

android {
    testOptions.managedDevices.allDevices {
        pixel6Api31(ManagedVirtualDevice) {
            device = "Pixel 6"
            apiLevel = 31
            systemImageSource = "aosp"
        }
    }
    targetProjectPath = ":datastore:integration-tests:macrobenchmark-target"
    namespace = "androidx.datastore.baselineprofile"
}

dependencies {
    implementation(androidx.projectOrArtifact(":benchmark:benchmark-junit4"))
    implementation(androidx.projectOrArtifact(":benchmark:benchmark-macro-junit4"))
    implementation(libs.testRules)
    implementation(libs.testExtJunit)
    implementation(libs.testCore)
    implementation(libs.testRunner)
    implementation(libs.testUiautomator)
    implementation(libs.testExtTruth)
}

baselineProfile {
    managedDevices = ["pixel6Api31"]
    useConnectedDevices = false
}

// This test is disabled because it's only to generate the baseline profile and can work only
// on a gradle ci.
androidx {
    deviceTests {
        enabled = false
    }
}
