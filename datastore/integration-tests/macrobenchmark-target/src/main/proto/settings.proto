syntax = "proto3";

option java_package = "androidx.datastore.macrobenchmark.target";
option java_multiple_files = true;

message Settings {
  string user = 1;
  int32 display_mode = 2;
  int64 camera = 3;
  float volume = 4;
  double brightness = 5;
  bool dark_mode = 6;
}
