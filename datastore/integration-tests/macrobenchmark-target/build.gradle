plugins {
    id("AndroidXPlugin")
    id("AndroidXComposePlugin")
    id("com.android.application")
    id("com.google.protobuf")
    alias(libs.plugins.kotlinSerialization)
}

android {
    compileSdk { version = release(36) { minorApiLevel = 1 }}
    namespace = "androidx.datastore.macrobenchmark.target"
}

dependencies {
    implementation project(":core:core-ktx")
    implementation project(":datastore:datastore-preferences")
    implementation libs.protobufKotlinLite
    implementation libs.kotlinSerializationJson
    implementation project(":activity:activity-compose")
    implementation project(":datastore:datastore")
    implementation project(":compose:runtime:runtime")
    implementation project(":compose:runtime:runtime-tracing")
    implementation project(":compose:ui:ui")
    implementation project(":compose:ui:ui-graphics")
    implementation project(":compose:ui:ui-tooling")
    implementation project(":compose:ui:ui-tooling-preview")
    implementation project(":compose:material3:material3")
    implementation project(":tracing:tracing")
    debugImplementation project(":compose:ui:ui-tooling")
    debugImplementation project(":compose:ui:ui-test-manifest")
}

protobuf {
    generateProtoTasks {
        all().forEach { task ->
            task.builtins {
                create("kotlin") {
                    option("lite")
                }
            }
        }
    }
}
