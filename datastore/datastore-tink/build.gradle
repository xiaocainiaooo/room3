import androidx.build.KotlinTarget
import androidx.build.SoftwareType
import androidx.build.PlatformIdentifier

plugins {
    id("AndroidXPlugin")
}

androidXMultiplatform {
    jvm()
    androidLibrary {
        namespace = "androidx.datastore.tink"
    }

    defaultPlatform(PlatformIdentifier.JVM)

    sourceSets {
        commonMain {
            dependencies {
                api(project(":datastore:datastore-core"))
            }
        }
        jvmMain {
            dependencies {
                api(libs.tink)
            }
        }
        androidMain {
            dependencies {
                // Do not replace this dependency with libs.tink and move this to commonMain as
                // users using a different version of tinkAndroid will have name collisions.
                api(libs.tinkAndroid)
            }
        }

        commonTest {
            dependencies {
                implementation(project(":kruth:kruth"))
                implementation(libs.kotlinTest)
                implementation(libs.kotlinCoroutinesTest)
                implementation(libs.okio)
            }
        }

        androidDeviceTest {
            dependencies {
                implementation(libs.testRunner)
            }
        }
    }
}

androidx {
    name = "datastore:datastore-tink"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2026"
    description = "Encryption support for datastore by integrating with the Tink library"
    kotlinTarget = KotlinTarget.KOTLIN_2_2
}