import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
}

dependencies {
    implementation(project(":wear:tiles:tiles"))
    implementation(project(":wear:protolayout:protolayout-material3"))
    compileOnly(project(":annotation:annotation-sampled"))
}

android {
  compileSdk { version = release(35) }

  defaultConfig {
        minSdk = 26
    }

    namespace = "androidx.wear.tiles.snippet_samples"
}

androidx {
    name = "androidx.wear.tiles:tiles-snippet-samples"
    type = SoftwareType.SAMPLES
    inceptionYear = "2025"
    description = "Contains the sample code for Tiles library."
}