import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
}

dependencies {
    api(libs.jspecify)
    api(libs.androidx.annotation)
    api(project(':wear:protolayout:protolayout-expression'))
    api(project(":wear:tiles:tiles"))

    implementation(project(":wear:tiles:tiles-proto"))

    testImplementation(libs.junit)
    testImplementation(libs.testCore)
    testImplementation(libs.testRunner)
    testImplementation(libs.testExtJunit)
    testImplementation(libs.truth)

    annotationProcessor(libs.nullaway)
}

android {
    compileSdk { version = release(35) }

    defaultConfig {
        minSdk { version = release(26) }
    }
    namespace = "androidx.wear.tiles.material"
}

androidx {
    name = "Android Wear Tiles Material"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2021"
    description = "Material components library for Android Wear Tiles."
    enableRobolectric()
}
