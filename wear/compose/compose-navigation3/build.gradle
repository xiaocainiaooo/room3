import androidx.build.SoftwareType
import androidx.build.PlatformIdentifier

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("AndroidXComposePlugin")
}

dependencies {
    implementation("androidx.navigation3:navigation3-ui:1.0.0")
    implementation("androidx.navigation3:navigation3-runtime:1.0.0")
    implementation(project(":wear:compose:compose-material3"))
    implementation("androidx.compose.animation:animation:1.9.3")

    androidTestImplementation(project(":navigationevent:navigationevent-testing"))
    androidTestImplementation(project(":compose:test-utils"))
    androidTestImplementation(project(":compose:ui:ui-test-junit4"))
    androidTestImplementation("androidx.lifecycle:lifecycle-runtime-testing:2.7.0")
    androidTestImplementation(libs.testRunner)
    androidTestImplementation(libs.truth)

    androidTestImplementation(project(":compose:foundation:foundation"))
    androidTestImplementation(project(":compose:ui:ui-test"))
    androidTestImplementation(project(":test:screenshot:screenshot"))
}

android {
    compileSdk { version = release(36) }

    defaultConfig {
        minSdk { version = release(25) }
    }
    namespace = "androidx.wear.compose.navigation3"
}

androidx {
    name = "Android Wear Compose Navigation 3"
    type = SoftwareType.PUBLISHED_LIBRARY_ONLY_USED_BY_KOTLIN_CONSUMERS
    inceptionYear = "2025"
    description = "WearOS Compose Navigation3 Library. This library makes it easier " +
            "for developers to write Jetpack Compose applications for Wearable devices by " +
            "providing functionality to support navigation with Jetpack Navigation3. " +
            "It builds upon the Jetpack Compose libraries."
    samples(project(":wear:compose:compose-navigation3-samples"))
}
