import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("AndroidXComposePlugin")
}

androidx {
    name = "Remote Compose Wear Material3"
    type = SoftwareType.PUBLISHED_LIBRARY_ONLY_USED_BY_KOTLIN_CONSUMERS
    inceptionYear = "2025"
    description = "Provides a set of Remote Compose Material3 components for Wear, built on top of Remote Compose Foundation components."
    samples(project(":wear:compose:remote:remote-material3-samples"))
    addGoldenImageAssets()
}

android {
    namespace = "androidx.wear.compose.remote.material3"
    compileSdk { version = release(35) }
    defaultConfig {
        minSdk { version = release(29) }
    }
}

dependencies {
    implementation(project(":compose:remote:remote-creation-compose"))
    implementation(project(":compose:remote:remote-creation"))
    implementation("androidx.graphics:graphics-path:1.0.1")
    implementation("androidx.wear.compose:compose-material3:1.5.0")
    implementation(project(":compose:ui:ui"))
    implementation("androidx.compose.material3:material3:1.3.2")
    implementation("androidx.compose.runtime:runtime:1.8.3")
    implementation(project(":compose:foundation:foundation"))
    implementation(project(":compose:foundation:foundation-layout"))

    androidTestImplementation(project(":wear:compose:remote:remote-material3-samples"))
    androidTestImplementation(project(":compose:remote:remote-creation"))
    androidTestImplementation(project(":compose:remote:remote-player-core"))
    androidTestImplementation(project(":compose:remote:remote-player-compose-testutils"))
    androidTestImplementation(project(":test:screenshot:screenshot"))
    androidTestImplementation("androidx.activity:activity:1.7.2")
