import androidx.build.SoftwareType
import com.android.build.api.variant.HasAndroidTest

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("androidx.benchmark")
}

ext {
    fontDir = project(":noto-emoji-compat-font").projectDir
}

android {
    namespace = "androidx.emoji2.benchmark"
}

androidComponents {
    def emojiAssetsPath = new File(fontDir, "supported-emojis").getAbsolutePath()
    onVariants(selector().all()) { variant ->
        (variant as HasAndroidTest).androidTest.sources.assets.addStaticSourceDirectory(emojiAssetsPath)
    }
}

dependencies {
    api(libs.jspecify)
    androidTestImplementation(project(":emoji2:emoji2"))
    androidTestImplementation(project(":emoji2:emoji2-bundled"))
    androidTestImplementation(project(":benchmark:benchmark-junit4"))
    androidTestImplementation(libs.junit)
    androidTestImplementation(libs.testExtJunit)
    androidTestImplementation(libs.testCore)
    androidTestImplementation(libs.testRunner)
    androidTestImplementation(libs.testRules)
    androidTestImplementation(libs.mockitoCore)
    androidTestImplementation(libs.dexmakerMockito)
    androidTestImplementation(project(":internal-testutils-runtime"))
}

androidx {
    name = "Emoji2 Benchmarks"
    type = SoftwareType.BENCHMARK
    inceptionYear = "2021"
    description = "Emoji2 Benchmarks"
}
