import androidx.build.KotlinTarget
import androidx.build.SoftwareType
import org.jetbrains.kotlin.gradle.tasks.KotlinCompile

plugins {
    id("AndroidXPlugin")
    id("kotlin")
}

dependencies {
    api(project(":room3:room3-compiler-processing"))
    // For Java source compilation
    implementation(libs.googleCompileTesting)
    // For KSP processing
    implementation(libs.ksp)
    implementation(libs.kspApi)
    implementation(libs.kspCommon)
    // Remove exclusion when project targets Kotlin 2.3. Added right now to avoid adding Kotlin 2.3
    // to the runtimeClasspath. See b/457417317
    implementation(libs.kspEmbeddable, {
        exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib"
    })
    // For Kotlin source compilation and KAPT
    implementation(libs.kotlinCompilerEmbeddable)
    implementation(libs.kotlinAnnotationProcessingEmbeddable)
}

// enable opt in only for tests so that we don't create non experimental APIs by mistake
// in the source.
tasks.named("compileTestKotlin", KotlinCompile.class).configure {
    it.kotlinOptions {
        freeCompilerArgs += [
                "-opt-in=androidx.room3.compiler.processing.ExperimentalProcessingApi"
        ]
    }
}

afterEvaluate {
    lint {
        lintOptions {
            // Until fully switch to K2, existing FE1.0 usages are legitimate
            // TODO(b/314151707)
            disable("KotlincFE10")
        }
    }
}

androidx {
    name = "Room XProcessor Testing"
    type = SoftwareType.ANNOTATION_PROCESSOR_UTILS
    inceptionYear = "2020"
    description = "Testing helpers for Room XProcessing APIs"
    kotlinTarget = KotlinTarget.KOTLIN_2_3
}
