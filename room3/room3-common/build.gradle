import androidx.build.KotlinTarget
import androidx.build.SoftwareType
import androidx.build.PlatformIdentifier
import org.jetbrains.kotlin.gradle.plugin.KotlinPlatformType

plugins {
    id("AndroidXPlugin")
}

androidXMultiplatform {
    js()
    jvm()
    mac()
    linux()
    ios()
    wasmJs()
    tvos()
    watchos()

    defaultPlatform(PlatformIdentifier.JVM)

    sourceSets {
        commonMain.dependencies {
            api("androidx.annotation:annotation:1.9.1")
        }

        commonTest.dependencies {
            implementation(project(":kruth:kruth"))
            implementation(libs.kotlinTest)
        }

        jvmTest.dependencies {
            implementation(libs.guava)
            implementation(libs.kotlinTestJunit)
        }
    }
}

androidx {
    name = "Room-Common"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2017"
    description = "Android Room-Common"
    kotlinTarget = KotlinTarget.KOTLIN_2_1
}


kotlin {
    try {
        ohosArm64() { binaries.configureEach { linkerOpts += ["-lsqlite3"] } }
    } catch (Throwable e) {
        // Ignore if target is not available in the current Kotlin plugin
    }
    try {
        ohosX64() { binaries.configureEach { linkerOpts += ["-lsqlite3"] } }
    } catch (Throwable e) {
        // Ignore if target is not available in the current Kotlin plugin
    }
    
    sourceSets {
        try {
            def nativeMain = findByName("nativeMain")
            if (nativeMain != null) {
                ohosArm64Main.dependsOn(nativeMain)
                ohosX64Main.dependsOn(nativeMain)
            }
            def nativeTest = findByName("nativeTest")
            if (nativeTest != null) {
                ohosArm64Test.dependsOn(nativeTest)
                ohosX64Test.dependsOn(nativeTest)
            }
        } catch (Throwable e) {
            // Ignore
        }
    }
}
