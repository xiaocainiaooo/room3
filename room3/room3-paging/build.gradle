import androidx.build.KotlinTarget
import androidx.build.PlatformIdentifier
import androidx.build.SoftwareType
import com.android.build.gradle.internal.lint.AndroidLintAnalysisTask
import com.android.build.gradle.internal.lint.LintModelWriterTask
import com.google.devtools.ksp.gradle.KspAATask
import org.jetbrains.kotlin.gradle.plugin.KotlinPlatformType

plugins {
    id("AndroidXPlugin")
    id("com.google.devtools.ksp")
}

androidXMultiplatform {
    androidLibrary {
        namespace = "androidx.room3.paging"
    }
    js()
    jvm()
    mac()
    linux()
    ios()
    tvos()
    watchos()
    wasmJs()

    defaultPlatform(PlatformIdentifier.ANDROID)

    sourceSets {
        commonMain.dependencies {
            api("androidx.paging:paging-common:3.4.2")
            api(project(":room3:room3-runtime"))
        }

        commonTest.dependencies {
            implementation(libs.kotlinCoroutinesTest)
            implementation(project(":kruth:kruth"))
        }

        create("jvmNativeWebMain").dependsOn(commonMain)

        jvmMain.dependsOn(jvmNativeWebMain)

        nativeMain {
            dependsOn(jvmNativeWebMain)
            dependencies {
                implementation(libs.atomicFu)
            }
        }

        webMain.dependsOn(jvmNativeWebMain)

        androidDeviceTest.dependencies {
            implementation(libs.junit)
            implementation(project(":internal-testutils-common"))
            implementation(libs.kotlinTestJunit)
            implementation(libs.testExtJunit)
            implementation(libs.testCore)
            implementation(libs.testRunner)
            implementation("androidx.arch.core:core-testing:2.2.0")
            implementation("androidx.paging:paging-testing:3.4.2")
        }
    }
}

dependencies {
    add("kspAndroidDeviceTest", project(":room3:room3-compiler"))
}

androidx {
    name = "Room Paging"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2021"
    description = "Room Paging integration"
    kotlinTarget = KotlinTarget.KOTLIN_2_1
}


kotlin {
    try {
        ohosArm64() { binaries.configureEach { linkerOpts += ["-lsqlite3"] } }
    } catch (Throwable e) {
        // Ignore if target is not available in the current Kotlin plugin
    }
    try {
        ohosX64() { binaries.configureEach { linkerOpts += ["-lsqlite3"] } }
    } catch (Throwable e) {
        // Ignore if target is not available in the current Kotlin plugin
    }
    
    sourceSets {
        try {
            def nativeMain = findByName("nativeMain")
            if (nativeMain != null) {
                ohosArm64Main.dependsOn(nativeMain)
                ohosX64Main.dependsOn(nativeMain)
            }
            def nativeTest = findByName("nativeTest")
            if (nativeTest != null) {
                ohosArm64Test.dependsOn(nativeTest)
                ohosX64Test.dependsOn(nativeTest)
            }
        } catch (Throwable e) {
            // Ignore
        }
    }
}
