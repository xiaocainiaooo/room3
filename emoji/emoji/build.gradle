import androidx.build.BundleInsideHelper
import androidx.build.SoftwareType
import com.android.build.api.variant.HasAndroidTest
import org.gradle.work.DisableCachingByDefault

import javax.inject.Inject

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
}

ext {
    fontDir = project(":noto-emoji-compat-font").projectDir
}

BundleInsideHelper.forInsideAar(
    project,
    /* from = */ "com.google.flatbuffers",
    /* to =   */ "androidx.text.emoji.flatbuffer",
    /* dropResourcesWithSuffix = */ null
)

dependencies {
    api(libs.jspecify)
    bundleInside(project(":noto-emoji-compat-flatbuffers"))

    api("androidx.core:core:1.3.0")
    implementation("androidx.collection:collection:1.4.2")

    androidTestImplementation(libs.testExtJunit)
    androidTestImplementation(libs.testCore)
    androidTestImplementation(libs.testRunner)
    androidTestImplementation(libs.testRules)
    androidTestImplementation(libs.espressoCore)
    androidTestImplementation(libs.mockitoCore)
    androidTestImplementation(libs.dexmakerMockito)
    androidTestImplementation(project(":internal-testutils-runtime"))
}

android {
    namespace = "androidx.emoji"
}

def copyFontLicenses = tasks.register("copyFontLicenses", LicenseCopyTask) { task ->
    task.description = "Copies specific font license files for inclusion in resources"
    task.inputDir.set(fontDir)
    task.outputDir.set(layout.buildDirectory.dir("generated/resources/font-licenses"))
}

androidComponents {
    def fontPath = new File(fontDir, "font").getAbsolutePath()
    def emojiPath = new File(fontDir, "supported-emojis").getAbsolutePath()

    onVariants(selector().all()) { variant ->
        variant.sources.resources.addGeneratedSourceDirectory(copyFontLicenses) { task ->
            task.outputDir
        }
        def testAssets = (variant as HasAndroidTest).androidTest.sources.assets
        testAssets.addStaticSourceDirectory(fontPath)
        testAssets.addStaticSourceDirectory(emojiPath)
    }
}

androidx {
    name = "Emoji"
    type = SoftwareType.PUBLISHED_LIBRARY
    mavenVersion = LibraryVersions.EMOJI
    inceptionYear = "2017"
    description = "Core library to enable emoji compatibility in Kitkat and newer devices to avoid the empty emoji characters."

    extraLicense {
        name = "SIL Open Font License, Version 1.1"
        url = "https://scripts.sil.org/cms/scripts/page.php?item_id=OFL_web"
    }

    extraLicense {
        name = "Unicode, Inc. License"
        url = "https://www.unicode.org/license.html"
    }
}

@DisableCachingByDefault(because = "Primarily filesystem operations")
abstract class LicenseCopyTask extends DefaultTask {
    @InputDirectory
    abstract DirectoryProperty getInputDir()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @Inject
    abstract FileSystemOperations getFileSystemOperations()

    @TaskAction
    void taskAction() {
        getFileSystemOperations().copy {
            from(inputDir)
            include("LICENSE_UNICODE", "LICENSE_OFL")
            into(outputDir)
        }
    }
}
