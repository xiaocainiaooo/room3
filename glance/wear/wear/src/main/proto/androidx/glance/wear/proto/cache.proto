syntax = "proto3";

package androidx.glance.wear.proto;


// The spec for a widget container.
message WidgetContainerSpecProto {
  // The width of the content area in dp.
  float width_dp = 1;

  // The height of the content area in dp.
  float height_dp = 2;

  // The horizontal inner padding of the container in dp.
  float horizontal_padding_dp = 3;

  // The vertical inner padding of the container in dp.
  float vertical_padding_dp = 4;

  // The corner radius of the container in dp
  float corner_radius_dp = 5;
}

// A cache of widget container specs, keyed by container type.
message WearWidgetCacheProto {
  // The cached specs for widget containers.
  map<int32, WidgetContainerSpecProto> container_type_to_spec = 1;

  // The cached association between instanceId (flattened) to containerType.
  map<string, int32> instance_id_to_type = 2;
}

