syntax = "proto3";

package androidx.glance.wear.proto;

// An event where the widget was visible on screen.
message WearWidgetVisibleEventProto {
  // The ID of the widget instance for which an update is being requested.
  uint32 id = 1;

  // The namespace for the ID of the widget instance.
  string id_namespace = 2;

  // The instant when the widget instance was visible.
  uint64 start_time_millis = 3;

  // The duration for which the widget instance was visible
  uint64 duration_millis = 4;
}

message WearWidgetEventProto {
  oneof event {
    // A visibility event.
    WearWidgetVisibleEventProto visible_event = 1;
  }
}

// Encodes data for a batch of interaction events.
message WearWidgetEventBatchProto {
  // A list of interaction events.
  repeated WearWidgetEventProto events = 1;
}