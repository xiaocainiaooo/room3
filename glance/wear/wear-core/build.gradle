import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("com.squareup.wire")
    id("androidx.stableaidl")
}

dependencies {
    api("androidx.annotation:annotation:1.9.1")
    api(libs.kotlinCoroutinesAndroid)

    implementation(libs.jspecify)
    implementation(libs.guavaAndroid) // upgrading to newer version of guava due to CVE-2023-2976
    implementation(libs.kotlinCoroutinesGuava)
    testImplementation(libs.junit)
    testImplementation(libs.mockitoKotlin4)
    testImplementation(libs.testExtJunit)
    testImplementation(libs.testRunner)
    testImplementation(libs.truth)
    testImplementation(libs.kotlinCoroutinesTest)
}

wire {
    kotlin {}

    sourcePath {
        srcDir 'src/main/proto'
    }
}

android {
    namespace = "androidx.glance.wear.core"
    defaultConfig {
        minSdk { version = release(28) }
    }
    buildFeatures {
        aidl = true
    }
    buildTypes.all {
        stableAidl {
            version = 1
        }
    }
}

androidx {
    name = "androidx.glance.wear:wear-core"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2025"
    description = "Core functionality for Glance Wear."
    enableRobolectric()
}
