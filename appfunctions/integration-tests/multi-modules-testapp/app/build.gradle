import com.android.build.api.artifact.SingleArtifact

plugins {
    id("AndroidXPlugin")
    id("com.android.application")
    id("com.google.devtools.ksp")
}

android {
    namespace = "androidx.appfunctions.integration.testapp"
    compileSdk { version = release(36) }
    defaultConfig {
        minSdk = 33
    }
    // Prevent assets file from being compressed. This is for Uri access test.
    aaptOptions {
        noCompress += "txt"
    }
    buildTypes {
        release {
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt")
        }
    }
}

dependencies {
    implementation(libs.guavaAndroid)
    implementation(libs.kotlinCoroutinesAndroid)
    implementation(project(":appfunctions:appfunctions"))
    implementation(project(":appfunctions:appfunctions-service"))
    implementation(project(":appfunctions:integration-tests:multi-modules-testapp:shared-library"))
    implementation(project(":appfunctions:integration-tests:shared-schema"))
    implementation("androidx.appsearch:appsearch:1.1.0-rc01")
    implementation("androidx.appsearch:appsearch-platform-storage:1.1.0-rc01")
    implementation('androidx.concurrent:concurrent-futures-ktx:1.1.0')
    ksp(project(":appfunctions:appfunctions-compiler"))
    androidTestImplementation(libs.junit)
    androidTestImplementation(libs.truth)
    androidTestImplementation(libs.kotlinCoroutinesTest)
    androidTestImplementation(libs.testRunner)
    androidTestImplementation(libs.testMonitor)
    androidTestImplementation(libs.kotlinTest)
}

ksp {
    arg("appfunctions:aggregateAppFunctions", "true")
}

// Define a configuration that can be consumed, as this project is a provider of test apks for
// profile verification integration test.
configurations {
    apkAssets {
        canBeConsumed = true
        canBeResolved = false
        attributes {
            attribute(
                    LibraryElements.LIBRARY_ELEMENTS_ATTRIBUTE,
                    objects.named(LibraryElements, 'appfunction-integrationTests-apkAssets')
            )
        }
    }
}

// Release apk variants are added as output artifacts to the apkAssets configuration.
// The apkAssets configuration is consumed by profile-verification integration test and
// artifacts are placed in the assets folder.
androidComponents {
    onVariants(selector().all().withBuildType("release"), { variant ->
        artifacts {
            apkAssets(variant.artifacts.get(SingleArtifact.APK.INSTANCE))
        }
    })
}
