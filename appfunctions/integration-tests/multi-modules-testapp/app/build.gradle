// TODO(b/452807124): Remove when we migrate to built-in-kotlin.
// Work-around for b/452908579. We "undo" the change that the org.jetbrains.kotlin.android plugin
// applies when configuring the default stdlib:
// https://github.com/JetBrains/kotlin/blob/master/libraries/tools/kotlin-gradle-plugin/src/common/kotlin/org/jetbrains/kotlin/gradle/internal/stdlibDependencyManagement.kt
kotlin.target.compilations.configureEach { compilation ->
    compilation.kotlinSourceSets.forAll { sourceSet ->
        if (sourceSet.name != "main") return

        project.configurations.named(sourceSet.apiConfigurationName).configure { config ->
            config.withDependencies { dependencySet ->
                dependencySet.remove(
                        project.dependencies.create(
                                "org.jetbrains.kotlin:kotlin-stdlib:${kotlin.coreLibrariesVersion}"
                        )
                )
            }
        }
    }
}

