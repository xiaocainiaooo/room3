import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
}

dependencies {
    implementation(libs.junit)
    implementation(libs.testCoreKtx)
    implementation(libs.robolectric)
    implementation(libs.mockitoCore4)
    implementation(libs.mockitoKotlin4)
    implementation("androidx.annotation:annotation:1.8.1")
    implementation(project(":xr:projected:projected-binding"))
    implementation(project(":xr:projected:projected"))
}

android {
    compileSdk { version = release(36) }
    namespace = "androidx.xr.projected.testing"
}

androidx {
    name = "XR Projected Testing"
    type = SoftwareType.PUBLISHED_TEST_LIBRARY
    inceptionYear = "2026"
    description = "Libraries to aid in unit testing Projected clients."
    enableRobolectric()
}
