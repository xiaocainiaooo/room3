plugins {
    id("AndroidXPlugin")
    id("AndroidXComposePlugin")
    id("com.android.library")
}

dependencies {
    api("androidx.compose.runtime:runtime:1.10.0")
    api("androidx.compose.ui:ui:1.10.0")
    api("androidx.compose.foundation:foundation:1.10.0")
    api("androidx.annotation:annotation:1.9.1")

    androidTestImplementation(project(":compose:ui:ui-test"))
    androidTestImplementation(project(":compose:ui:ui-test-junit4"))
    androidTestImplementation(project(":compose:test-utils"))
    androidTestImplementation(project(":test:screenshot:screenshot"))
    androidTestImplementation(project(":xr:glimmer:glimmer:glimmer-samples"))
    androidTestImplementation(project(":xr:glimmer:test-utils"))

    androidTestImplementation("androidx.core:core:1.16.0")
    androidTestImplementation(libs.espressoCore)
    androidTestImplementation(libs.testRules)
    androidTestImplementation(libs.testRunner)
    androidTestImplementation(libs.junit)
    androidTestImplementation(libs.truth)
