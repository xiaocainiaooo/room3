import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("com.android.experimental.built-in-kotlin")
    id("androidx.stableaidl")
}

dependencies {
    api(project(":xr:scenecore:scenecore-runtime"))
}

android {
    namespace = "androidx.xr.scenecore.projected"
    defaultConfig {
        minSdk { version = release(24) }
    }
    buildFeatures {
        aidl = true
    }

    buildTypes.all {
        stableAidl {
            version = 1
        }
    }
}

androidx {
    name = "XR SceneCore Projected"
    type = SoftwareType.SNAPSHOT_ONLY_LIBRARY_WITH_API_TASKS
    inceptionYear = "2026"
    description = "SceneCore's core implementation for projected devices"
}
