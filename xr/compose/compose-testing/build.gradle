import androidx.build.AndroidXConfig
import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("AndroidXComposePlugin")
}

dependencies {
    api(project(":xr:compose:compose"))
    api(project(":xr:runtime:runtime"))
    api(project(":xr:runtime:runtime-testing"))
    api(project(":xr:scenecore:scenecore"))
    api(project(":xr:scenecore:scenecore-testing"))

    implementation(project(":xr:scenecore:scenecore-spatial-core"))
    implementation("androidx.annotation:annotation:1.8.1")
    implementation("androidx.compose.runtime:runtime:1.7.5")
    implementation("androidx.compose.ui:ui:1.7.5")
    implementation("androidx.compose.ui:ui-unit:1.7.5")
    implementation("androidx.compose.ui:ui-util:1.7.5")
    implementation("androidx.compose.ui:ui-test-junit4:1.7.5")
    implementation("com.google.ar:impress:0.0.12")

    compileOnly("com.google.errorprone:error_prone_annotations:2.30.0")
    compileOnly(libs.androidExtensionsXr)
    compileOnly(files(new File(AndroidXConfig.getPrebuiltsRoot(project), "androidx/xr/extensions/com.android.extensions.xr.host.test.jar")))
}

android {
    defaultConfig {
        minSdk { version = release(24) }
    }
    namespace = "androidx.xr.compose.testing"
}

androidx {
    name = "XR Compose Testing"
    type = SoftwareType.PUBLISHED_KOTLIN_ONLY_TEST_LIBRARY
    inceptionYear = "2024"
    description = "Libraries to aid in unit testing Compose for XR clients."
}
