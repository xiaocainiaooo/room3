import androidx.build.SoftwareType
import com.android.build.api.variant.HasAndroidTest
import com.android.build.api.variant.HasUnitTest

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
}

dependencies {
    api(libs.jspecify)
    // Public API dependencies
    api("androidx.annotation:annotation:1.8.1")
    api("androidx.core:core:1.3.2")
    api("androidx.fragment:fragment:1.6.2")

    // This has stub APIs for access to legacy Android APIs, so we don't want
    // any dependency on this module.
     compileOnly(project(":biometric:biometric-stubs"))

    // Internal dependencies
    implementation("androidx.activity:activity:1.9.0")
    implementation("androidx.appcompat:appcompat:1.2.0")
    implementation("androidx.lifecycle:lifecycle-livedata-core:2.2.0")
    implementation("androidx.lifecycle:lifecycle-viewmodel:2.2.0")
    implementation("androidx.lifecycle:lifecycle-common-java8:2.2.0")
    implementation("androidx.lifecycle:lifecycle-process:2.8.7")

    testImplementation(libs.guavaAndroid)
    testImplementation(libs.testCore)
    testImplementation(libs.testRunner)
    testImplementation(libs.junit)
    testImplementation(libs.kotlinCoroutinesTest)
    testImplementation(libs.mockitoCore4)
    testImplementation(libs.mockitoKotlin4)
    testImplementation(libs.robolectric)
    testImplementation(libs.truth)
    testImplementation(libs.espressoIntents)
    testImplementation(libs.testExtJunit)
    testImplementation("androidx.fragment:fragment-testing:1.4.1")

    androidTestImplementation(libs.guavaAndroid)
    androidTestImplementation(libs.junit)
    androidTestImplementation(libs.testCore)
    androidTestImplementation(libs.testExtJunit)
    androidTestImplementation(libs.testRunner)
    androidTestImplementation(libs.testMonitor)
    androidTestImplementation(libs.testUiautomator)
    androidTestImplementation(libs.mockitoCore)
    androidTestImplementation(libs.truth)
    androidTestImplementation(libs.dexmakerMockito)
    androidTestImplementation(libs.espressoCore)
    androidTestImplementation(libs.testRules)
    androidTestImplementation(project(":internal-testutils-lifecycle"))
    androidTestImplementation("androidx.fragment:fragment-testing:1.4.1")
}

android {
    aaptOptions {
        noCompress "ttf"
    }
    defaultConfig.consumerProguardFiles("proguard-rules.pro")
    namespace = "androidx.biometric"
    compileSdk { version = release(36) { minorApiLevel = 1 }}
}

androidComponents {
    def sharedTestDir = "src/test-common/java"
    onVariants(selector().all()) { variant ->
        (variant as HasUnitTest).unitTest.sources.java.addStaticSourceDirectory(sharedTestDir)
        (variant as HasAndroidTest).androidTest.sources.java.addStaticSourceDirectory(sharedTestDir)
    }
}

androidx {
    name = "Biometric"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2018"
    description = "The Biometric library is a static library that you can add to your Android application. It invokes BiometricPrompt on devices running P and greater, and on older devices will show a compat dialog."
    samples(project(":biometric:biometric-samples"))
    enableRobolectric()
}
