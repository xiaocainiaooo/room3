import androidx.build.SoftwareType
import org.jetbrains.kotlin.gradle.tasks.KotlinCompile

plugins {
    id("AndroidXPlugin")
    id("com.android.library")
    id("androidx.inspection")
}

dependencies {
    api(libs.jspecify)
    api("androidx.annotation:annotation:1.8.1")
    compileOnly(project(":inspection:inspection"))

    androidTestImplementation(project(":inspection:inspection-testing"))
    androidTestImplementation(libs.testRunner)
    androidTestImplementation(libs.testExtJunit)
    androidTestImplementation(libs.truth)
    androidTestImplementation(libs.kotlinCoroutinesAndroid)
    androidTestImplementation(libs.kotlinCoroutinesTest)
}

androidx {
    name = "SQLite Inspector"
    type = SoftwareType.IDE_PLUGIN
    // Decouple SQLITE_INSPECTOR because it depends on
    // the inspection protocol, which is alpha
    inceptionYear = "2019"
    description = "The implementation of SQLite Inspector."
}

android {
    defaultConfig {
        // studio pipeline works only starting with Android O
        minSdk { version = release(26) }
    }
    namespace = "androidx.sqlite.inspection"
}

androidComponents {
    onVariants(selector().all()) { variant ->
        variant.sources.resources.addStaticSourceDirectory("src/main/proto")
    }
}
