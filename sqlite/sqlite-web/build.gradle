import androidx.build.KotlinTarget
import androidx.build.PlatformIdentifier
import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
}

androidXMultiplatform {
    js()
    wasmJs()

    defaultPlatform(PlatformIdentifier.JS)

    sourceSets {
        commonMain {
            dependencies {
                api(project(":sqlite:sqlite"))
                api(libs.kotlinCoroutinesCore)
            }
        }
        wasmJsMain {
            languageSettings.optIn("kotlin.js.ExperimentalWasmJsInterop")
            dependencies {
                implementation(libs.kotlinXw3c)
            }
        }
        commonTest {
            dependencies {
                implementation(libs.kotlinTest)
                implementation(libs.kotlinCoroutinesTest)
                implementation(project(":kruth:kruth"))
                implementation(project(":sqlite:sqlite-web-worker-test"))
            }
        }
    }
}

androidx {
    name = "SQLite Web Integration"
    type = SoftwareType.PUBLISHED_LIBRARY
    inceptionYear = "2026"
    description = "The implementation of SQLite Web library using a Web Worker"
    kotlinTarget = KotlinTarget.KOTLIN_2_2
}
