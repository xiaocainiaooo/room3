import androidx.build.SoftwareType
import androidx.build.PlatformIdentifier
import org.jetbrains.kotlin.gradle.plugin.KotlinPlatformType
import org.jetbrains.kotlin.konan.target.Family

plugins {
    id("AndroidXPlugin")
    id("AndroidXComposePlugin")
}

androidXMultiplatform {
    androidLibrary {
        compileSdk { version = release(36) }
        namespace = "androidx.navigationevent.compose"
    }
    desktop()
    mac()
    linux()
    ios()
    watchos()
    tvos()
    mingwX64()
    js()
    wasmJs()

    defaultPlatform(PlatformIdentifier.ANDROID)

    sourceSets {
        commonMain.dependencies {
            api(project(":navigationevent:navigationevent"))
            api(project(":compose:runtime:runtime"))
            implementation(libs.kotlinCoroutinesCore)
        }

        commonTest.dependencies {
            implementation(libs.kotlinTest)
            implementation(project(":navigationevent:navigationevent-testing"))
            implementation(project(":kruth:kruth"))
        }

        androidMain.dependencies {
            // TODO(mgalhardo): Change this to constraint once Compose 1.11 prebuilds are released.
            implementation(project(":compose:ui:ui")) {
                because("Ensure we are using the Compose-UI 1.11 or above")
            }
        }

        androidDeviceTest.dependencies {
            implementation("androidx.compose.material:material:1.9.2")
            implementation(project(":compose:ui:ui-test"))
            implementation(project(":compose:ui:ui-test-junit4"))
            implementation(project(":compose:ui:ui-test-manifest"))
            implementation(libs.testExtJunit)
            implementation(libs.testCore)
            implementation(libs.testRunner)
            implementation(libs.testRules)
            implementation(libs.espressoCore)
        }

        create("nonAndroidMain").dependsOn(commonMain)
        create("nonAndroidTest").dependsOn(commonTest)

        desktopMain.dependsOn(nonAndroidMain)
        desktopTest.dependsOn(nonAndroidTest)

        nonJvmMain.dependsOn(nonAndroidMain)
        nonJvmTest.dependsOn(nonAndroidTest)

        wasmJsMain.dependencies {
            implementation(libs.kotlinXw3c)
        }
    }
}

dependencies.constraints {
    // TODO(mgalhardo): Add constraints to properly migrate from the JetBrains fork.
    //  We need to prevent symbol duplication with old versions of the fork.
    //  Once the fork publishes a version that redirects to this artifact.
}

androidx {
    name = "NavigationEvent Compose"
    type = SoftwareType.PUBLISHED_LIBRARY_ONLY_USED_BY_KOTLIN_CONSUMERS
    samples(project(":navigationevent:navigationevent-samples"))
    inceptionYear = "2025"
    description = "Compose integration with NavigationEvent"
}
