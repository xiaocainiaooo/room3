plugins {
    id("AndroidXPlugin")
    id("com.android.test")
}

android {
    namespace = "androidx.compose.animation.macrobenchmark"
    compileSdk {
        version = release(36)
    }

    buildTypes {
        // This benchmark buildType is used for benchmarking, and should function like your
        // release build (for example, with minification on). It's signed with a debug key
        // for easy local/CI testing.
        benchmark {
            debuggable = true
            signingConfig = debug.signingConfig
            matchingFallbacks = ["release"]
        }
    }

    targetProjectPath = ":compose:animation:animation-benchmark:integration-tests:macrobenchmark-target"
    experimentalProperties["android.experimental.self-instrumenting"] = true
}

dependencies {
    implementation(project(":benchmark:benchmark-macro-junit4"))
    implementation(project(":internal-testutils-benchmark-macro"))
    implementation(libs.testExtJunit)
    implementation(libs.espressoCore)
    implementation(libs.testUiautomator)
}

androidComponents {
    beforeVariants(selector().all()) {
        enable = buildType == "benchmark"
    }
}