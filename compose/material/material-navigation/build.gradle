import androidx.build.PlatformIdentifier
import androidx.build.SoftwareType

plugins {
    id("AndroidXPlugin")
    id("AndroidXComposePlugin")
    alias(libs.plugins.kotlinSerialization)
}

androidXMultiplatform {
    androidLibrary {
        namespace = "androidx.compose.material.navigation"
        compileSdk { version = release(35) }
    }
    jvmStubs()
    linuxX64Stubs()

    defaultPlatform(PlatformIdentifier.ANDROID)

    sourceSets {
        commonMain.dependencies {
            api("androidx.navigation:navigation-compose:2.9.6")
            implementation(project(":compose:material:material"))
            implementation(libs.kotlinSerializationCore)
        }

        androidDeviceTest.dependencies {
            implementation(project(":compose:test-utils"))
            implementation("androidx.navigation:navigation-testing:2.9.6")
            implementation(project(":compose:ui:ui-test-junit4"))
            implementation(libs.testRunner)
            implementation(libs.junit)
            implementation(libs.truth)
            implementation(libs.testRules)
        }
        nonAndroidMain.dependsOn(commonMain)
        nonAndroidTest.dependsOn(commonTest)
        jvmStubsMain.dependsOn(nonAndroidMain)
        jvmStubsTest.dependsOn(nonAndroidTest)
        nonJvmMain.dependsOn(nonAndroidMain)
        nonJvmTest.dependsOn(nonAndroidTest)
    }
}

androidx {
    name = "Compose Material Navigation"
    type = SoftwareType.PUBLISHED_LIBRARY_ONLY_USED_BY_KOTLIN_CONSUMERS
    mavenVersion = LibraryVersions.COMPOSE
    inceptionYear = "2024"
    description = "Compose Material integration with Navigation"
    legacyDisableKotlinStrictApiMode = true
    samples(project(":compose:material:material-navigation-samples"))
}
