import androidx.build.SoftwareType
import androidx.build.PlatformIdentifier

plugins {
    id("AndroidXPlugin")
    id("AndroidXComposePlugin")
}

androidXMultiplatform {
    androidLibrary {
        compileSdk { version = release(35) }
        namespace = "androidx.compose.foundation.layout"
        optimization {
            it.consumerKeepRules.publish = true
            it.consumerKeepRules.files.add(new File("proguard-rules.pro"))
        }
    }
    jvmStubs()
    linuxX64Stubs()

    defaultPlatform(PlatformIdentifier.ANDROID)

    sourceSets {
        commonMain.dependencies {
            api(project(":compose:ui:ui"))
            implementation(project(":compose:runtime:runtime"))
            implementation("androidx.compose.ui:ui-util:1.10.0")
            implementation("androidx.collection:collection:1.5.0")
            implementation("androidx.compose.ui:ui-unit:1.10.0")
        }

        androidMain.dependencies {
            api("androidx.annotation:annotation:1.8.1")
            api("androidx.annotation:annotation-experimental:1.4.1")
            implementation("androidx.core:core:1.16.0")
            implementation("androidx.compose.animation:animation-core:1.2.1")
        }

        commonStubsMain {}.dependsOn(commonMain)
        jvmStubsMain.dependsOn(commonStubsMain)
        linuxx64StubsMain.dependsOn(commonStubsMain)

        androidDeviceTest.dependencies {
            implementation(project(":compose:foundation:foundation"))
            implementation("androidx.compose.ui:ui-test-junit4:1.2.1")
            implementation(project(":compose:test-utils"))
            implementation("androidx.activity:activity-compose:1.3.1")
            implementation("androidx.activity:activity:1.9.1")

            implementation(libs.testRules)
            implementation(libs.testRunner)
            implementation(libs.junit)
            implementation(libs.truth)
        }

        androidHostTest.dependencies {
            implementation(libs.testRules)
            implementation(libs.testRunner)
            implementation(libs.junit)
            implementation(libs.truth)
        }
    }
}

androidx {
    name = "Compose Layouts"
    type = SoftwareType.PUBLISHED_LIBRARY_ONLY_USED_BY_KOTLIN_CONSUMERS
    inceptionYear = "2019"
    description = "Compose layout implementations"
    legacyDisableKotlinStrictApiMode = true
    samples(project(":compose:foundation:foundation-layout:foundation-layout-samples"))
    deviceTests.minSdkForFtlOverride = 24 // b/437944630
}
