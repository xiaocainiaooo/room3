/**
 * This file was created using the `createProject` gradle task (./gradlew createProject)
 *
 * Please use the task when creating a new project, rather than copying an existing project and
 * modifying its settings.
 */

plugins {
    id("AndroidXPlugin")
    id("com.android.test")
}

android {
    compileSdk { version = release(36) }
    defaultConfig {
        minSdk { version = release(31) } // These benchmarks do not run below API 31 as they use newer APIs
    }
    namespace = "androidx.compose.integration.hero.sysui.macrobenchmark"
    targetProjectPath = ":compose:integration-tests:hero:sysui:sysui-macrobenchmark-target"
    experimentalProperties["android.experimental.self-instrumenting"] = true
}

// Create a release build type and make sure it's the only one enabled.
// This is needed because we benchmark the release build type only.
android.buildTypes { release {} }
androidComponents { beforeVariants(selector().all()) { enabled = buildType == 'release' } }

dependencies {
    implementation(project(":benchmark:benchmark-junit4"))
    implementation(project(":benchmark:benchmark-macro-junit4"))
    implementation(project(":compose:integration-tests:hero:sysui:sysui-macrobenchmark-implementation"))
    implementation(project(":compose:integration-tests:hero:hero-common:hero-common-macrobenchmark"))
    implementation("androidx.compose.ui:ui-unit:1.9.5")
    implementation("androidx.compose.material3:material3-window-size-class:1.4.0")
    implementation(project(":internal-testutils-benchmark-macro"))
    implementation(libs.testRules)
    implementation(libs.testExtJunit)
    implementation(libs.testCore)
    implementation(libs.testRunner)
    implementation(libs.testUiautomator)
}
