import androidx.build.SoftwareType
import androidx.build.PlatformIdentifier

plugins {
    id("AndroidXPlugin")
    id("AndroidXComposePlugin")
}

androidXMultiplatform {
    androidLibrary {
        compileSdk { version = release(36) }
        namespace = "androidx.compose.material3.adaptive.navigation3"
        androidResources.enable = true
    }
    jvmStubs()
    linuxX64Stubs()

    defaultPlatform(PlatformIdentifier.ANDROID)

    sourceSets {
        commonMain.dependencies {
            api(project(":compose:material3:adaptive:adaptive-navigation"))
            api("androidx.navigation3:navigation3-ui:1.0.0")
            implementation("androidx.collection:collection:1.5.0")
            implementation("androidx.navigationevent:navigationevent-compose:1.0.1")
        }

        androidMain.dependencies {
            api("androidx.annotation:annotation:1.8.1")
            implementation("androidx.activity:activity-compose:1.12.2")
        }

        androidDeviceTest.dependencies {
            implementation(project(":compose:material3:material3"))
            implementation(project(":compose:test-utils"))
            implementation(project(":navigation3:navigation3-ui"))
            implementation(libs.testRules)
            implementation(libs.testRunner)
            implementation(libs.junit)
            implementation(libs.truth)
        }
    }
}

androidx {
    name = "Material Adaptive"
    type = SoftwareType.PUBLISHED_LIBRARY_ONLY_USED_BY_KOTLIN_CONSUMERS
    inceptionYear = "2025"
    description = "Compose Material Design Adaptive Library"
    addGoldenImageAssets()
